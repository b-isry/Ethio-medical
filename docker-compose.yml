# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:14-alpine 
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: . 
    container_name: python_app
    ports:
      - "8000:8000"
    env_file:
      - .env 
    volumes:
      - .:/app
    depends_on:
      - db 
    command: ["uvicorn", "analytical_api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"] 

volumes:
  postgres_data: