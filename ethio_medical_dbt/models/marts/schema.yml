# ethio_medical_dbt/models/marts/schema.yml

version: 2

models:
  - name: fct_messages
    description: "The central fact table, containing one row per message."
    columns:
      - name: message_id
        description: "The unique identifier for a message."
        tests:
          - unique
          - not_null

  - name: dim_channels
    description: "Dimension table for Telegram channel information."
    columns:
      - name: clean_channel_name
        description: "The clean, human-readable name of the channel."
        tests:
          - unique
          - not_null

  - name: fct_image_detections
    description: "One row per object detected in an image. Links back to fct_messages via message_id."
    columns:
      - name: message_id
        tests:
          - not_null
          - relationships:
              to: ref('fct_messages')
              field: message_id
      - name: detected_object
        tests:
          - not_null
      - name: confidence_score
        tests:
          - not_null